<template>
    <lightning-card title="Simple ToDo LWC">
        <div class="slds-p-around_medium">

            <lightning-input label="Nueva tarea" value={newTask} onchange={handleChange}></lightning-input>

            <lightning-button label="Agregar" variant="brand" onclick={addTask} class="slds-m-top_small"></lightning-button>

            <ul class="slds-m-top_medium">
                <template for:each={tasks} for:item="task">
                    <li key={task.id}>
                        <lightning-input type="checkbox" label={task.name} checked={task.done} data-id={task.id} onchange={toggleTask}></lightning-input>
                    </li>
                </template>
            </ul>

        </div>
    </lightning-card>
</template>
